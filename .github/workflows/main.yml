name: Docker Build and Push

on:
  push:
    branches: ["main"]  # Tự động chạy khi bạn push code lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Thiết lập Buildx để build được image đa nền tảng (Intel & Apple Chip)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Đăng nhập vào Docker Hub bằng tài khoản vinhsonvlog
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # --- BUILD & PUSH FRONTEND ---
      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          # Build cho cả 2 loại chip để chạy đâu cũng được
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fewebsite:latest
            ${{ secrets.DOCKER_USERNAME }}/fewebsite:${{ github.run_number }}

      # --- BUILD & PUSH BACKEND ---
      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bewebsite:latest
            ${{ secrets.DOCKER_USERNAME }}/bewebsite:${{ github.run_number }}
